name: ci

on: 
  workflow_dispatch:
  push:
    branches: main

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Cкачиваем код репозитория в виртуальную машину'
        uses: actions/checkout@v4

      - name: 'Установка NodeJS'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 'Установка зависимостей'
        run: npm ci

      - name: 'Сборка'
        run: npm run build
